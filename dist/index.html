<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#e74c3c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Yerevan Directory</title>
    <script type="module" crossorigin src="/assets/index-1rFHcFbm.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Bq9i6b3C.css">
  </head>
  <body>
    <div id="root"></div>
    <div id="loc-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:#c0392b;color:#fff;text-align:center;padding:14px;font-size:1rem;font-weight:600;cursor:pointer" onclick="getLoc()">
      📍 Use my location to find nearby venues
    </div>
    <script>
      let _locOk, _locErr;
      const _orig = navigator.geolocation.getCurrentPosition.bind(navigator.geolocation);
      navigator.geolocation.getCurrentPosition = function(ok, err, opts) {
        _locOk = ok; _locErr = err;
        const saved = sessionStorage.getItem("_loc");
        if (saved) { try { ok(JSON.parse(saved)); return } catch {} }
        document.getElementById("loc-banner").style.display = "block";
      };
      async function getLoc() {
        document.getElementById("loc-banner").style.display = "none";
        try {
          const pos = await new Promise((ok, er) => _orig(ok, er, { enableHighAccuracy: true, timeout: 10000 }));
          sessionStorage.setItem("_loc", JSON.stringify(pos));
          _locOk && _locOk(pos);
        } catch { _locErr && _locErr() }
      }
    </script>
  </body>
</html>
