<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#e74c3c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Yerevan Directory</title>
    <script type="module" crossorigin src="/assets/index-1rFHcFbm.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Bq9i6b3C.css">
    <style>.cat-btn{touch-action:manipulation;-webkit-touch-callout:none;cursor:pointer}.categories{-webkit-overflow-scrolling:auto}.cat-btn:active{transform:scale(0.95)!important}</style>
  </head>
  <body>
    <div id="root"></div>
    <div id="loc-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:#c0392b;color:#fff;text-align:center;padding:14px;font-size:1rem;font-weight:600;cursor:pointer" onclick="getLoc()">
      Use my location to find nearby venues
    </div>
    <script>
      var _locCached = new URLSearchParams(location.search).get("_loc");
      var _locErr;
      var _origLoc = navigator.geolocation.getCurrentPosition.bind(navigator.geolocation);
      navigator.geolocation.getCurrentPosition = function(ok, err) {
        _locErr = err;
        if (_locCached) {
          var p = _locCached.split(",").map(Number);
          ok({ coords: { latitude: p[0], longitude: p[1], accuracy: 100, altitude: null, altitudeAccuracy: null, heading: null, speed: null }, timestamp: Date.now() });
          return;
        }
        document.getElementById("loc-banner").style.display = "block";
      };
      window.getLoc = function() {
        document.getElementById("loc-banner").style.display = "none";
        _origLoc(function(pos) {
          location.href = "/?_loc=" + pos.coords.latitude + "," + pos.coords.longitude;
        }, function() { _locErr && _locErr(); }, { enableHighAccuracy: true, timeout: 10000 });
      };

      // Fix category tabs: intercept taps and reload preserving _loc
      document.addEventListener("click", function(e) {
        var btn = e.target.closest(".cat-btn");
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();
        var cat = btn.textContent.trim() === "All" ? "" : btn.textContent.trim();
        var q = new URLSearchParams(location.search);
        var loc = q.get("_loc");
        q.delete("_page");
        if (cat) q.set("category", cat); else q.delete("category");
        if (loc) q.set("_loc", loc); // preserve location
        var qs = q.toString();
        location.href = qs ? "/?" + qs : "/";
      }, true);
    </script>
  </body>
</html>
