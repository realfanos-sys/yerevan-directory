<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#e74c3c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Yerevan Directory</title>
    <script type="module" crossorigin src="/assets/index-1rFHcFbm.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Bq9i6b3C.css">
    <style>.cat-btn{touch-action:manipulation;-webkit-touch-callout:none;cursor:pointer}.categories{-webkit-overflow-scrolling:auto}.cat-btn:active{transform:scale(0.95)!important}</style>
  </head>
  <body>
    <div id="root"></div>
    <button id="loc-banner" type="button" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:#c0392b;color:#fff;text-align:center;padding:14px;font-size:1rem;font-weight:600;cursor:pointer;border:none;width:100%" onclick="getLoc()">
      <span id="loc-banner-text">Use my location to find nearby venues</span>
    </button>
    <script>
      (function(){
        var _err;
        var ls = window.localStorage;
        var cached = ls ? ls.getItem("_loc") : null;
        var coords = null;
        if (cached) try { coords = JSON.parse(cached); } catch(e) {}

        var g = navigator.geolocation;
        var banner = document.getElementById("loc-banner");
        var bannerText = document.getElementById("loc-banner-text");

        function setCoordsAndReload(lat, lng) {
          if (ls) ls.setItem("_loc", JSON.stringify({ lat: lat, lng: lng }));
          location.reload();
        }

        if (coords) {
          g.getCurrentPosition = function(ok) {
            ok({ coords: { latitude: coords.lat, longitude: coords.lng, accuracy: 100, altitude: null, altitudeAccuracy: null, heading: null, speed: null }, timestamp: Date.now() });
          };
        } else {
          if (banner) banner.style.display = "block";

          g.getCurrentPosition = function(ok, err) { _err = err; };

          // Silent IP geolocation fallback (proxied through our server)
          var ipAbort = setTimeout(function() {
            if (!coords && banner) banner.style.display = "block";
          }, 5000);
          fetch("/api/geoip")
            .then(function(r) { return r.json(); })
            .then(function(d) {
              clearTimeout(ipAbort);
              if (d && typeof d.lat === "number" && typeof d.lon === "number") {
                setCoordsAndReload(d.lat, d.lon);
              }
            })
            .catch(function() { clearTimeout(ipAbort); });
        }

        window.getLoc = function() {
          if (bannerText) bannerText.textContent = "Getting location...";
          var ifr = document.createElement("iframe");
          ifr.style.display = "none";
          document.body.appendChild(ifr);
          var w = ifr.contentWindow;
          if (w && w.navigator && w.navigator.geolocation) {
            w.navigator.geolocation.getCurrentPosition(function(pos) {
              try { document.body.removeChild(ifr); } catch(e) {}
              setCoordsAndReload(pos.coords.latitude, pos.coords.longitude);
            }, function() {
              try { document.body.removeChild(ifr); } catch(e) {}
              var code = err && err.code || "?";
              if (bannerText) bannerText.textContent = "Location failed (" + code + ") — tap to retry";
              if (banner) banner.style.display = "block";
              setTimeout(function() {
                if (bannerText) bannerText.textContent = "Use my location to find nearby venues";
              }, 4000);
            }, { enableHighAccuracy: true, timeout: 15000 });
          } else {
            try { document.body.removeChild(ifr); } catch(e) {}
            if (bannerText) bannerText.textContent = "Location failed — tap to retry";
            if (banner) banner.style.display = "block";
          }
        };
      })();

      document.addEventListener("click", function(e) {
        var btn = e.target.closest(".cat-btn");
        if (!btn) return;
        e.preventDefault();
        var cat = btn.textContent.trim() === "All" ? "" : btn.textContent.trim();
        var q = new URLSearchParams(location.search);
        q.delete("_page");
        if (cat) q.set("category", cat); else q.delete("category");
        var qs = q.toString();
        location.href = qs ? "/?" + qs : "/";
      }, true);
    </script>
  </body>
</html>
